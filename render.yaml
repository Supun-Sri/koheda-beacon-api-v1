services:
  # Web Service - Kohedha API
  - type: web
    name: koheda-api
    runtime: node
    region: singapore
    plan: starter
    branch: main
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BEACON_TTL_MS
        value: 7200000
      - key: DATABASE_URL
        fromDatabase:
          name: koheda-db
          property: connectionString
    autoDeploy: true

databases:
  - name: koheda-db
    databaseName: koheda
    user: koheda
    plan: starter
    region: singapore
    postgresMajorVersion: 16
    # Note: PostGIS extension needs to be enabled manually after creation
    # Run: CREATE EXTENSION IF NOT EXISTS postgis;
